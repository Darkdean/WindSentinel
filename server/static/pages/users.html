<section>
  <h2>用户管理</h2>
  <div class="row">
    <input id="user-name" placeholder="用户名"/>
    <input id="user-pass" placeholder="密码"/>
    <select id="user-role">
      <option value="admin">管理员</option>
      <option value="auditor">审计员</option>
      <option value="operator">操作员</option>
    </select>
    <button id="btn-create-user">创建用户</button>
  </div>
  <pre id="user-list"></pre>
  <div class="row">
    <input id="user-delete" placeholder="删除用户名"/>
    <button id="btn-delete-user">删除用户</button>
  </div>
</section>
