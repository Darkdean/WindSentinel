<section>
  <h2>远程 Shell</h2>
  <div class="row">
    <button id="btn-start-shell">启动Shell</button>
    <button id="btn-shell-history">加载历史</button>
  </div>
  <textarea id="shell-input" rows="4" placeholder="命令"></textarea>
  <div class="row">
    <button id="btn-shell-send">发送</button>
  </div>
  <pre id="shell-output"></pre>
  <div class="row">
    <input id="shell-search" placeholder="搜索历史"/>
    <button id="btn-shell-search">搜索</button>
    <button id="btn-shell-clear">清空历史</button>
    <button id="btn-shell-export-json">导出JSON</button>
    <button id="btn-shell-export-csv">导出CSV</button>
  </div>
  <div class="row">
    <button id="btn-shell-prev">上一页</button>
    <button id="btn-shell-next">下一页</button>
  </div>
  <pre id="shell-history"></pre>
</section>
