<section>
  <h2>Agent 管理</h2>
  <div class="row">
    <select id="agent-manage-list"></select>
    <button id="btn-agent-manage-refresh">刷新客户端列表</button>
  </div>
  <div class="grid">
    <div>
      <input id="agent-display-name" placeholder="显示名"/>
      <select id="agent-group"></select>
      <input id="agent-tags" placeholder="标签（逗号分隔）"/>
      <textarea id="agent-notes" rows="4" placeholder="备注"></textarea>
      <div class="row">
        <button id="btn-agent-load">加载配置</button>
        <button id="btn-agent-save">保存配置</button>
      </div>
    </div>
    <div>
      <h3>分组</h3>
      <input id="group-name" placeholder="分组名"/>
      <input id="group-desc" placeholder="分组说明"/>
      <button id="btn-group-create">创建分组</button>
      <pre id="group-list"></pre>
      <input id="group-delete-id" placeholder="删除分组ID"/>
      <button id="btn-group-delete">删除分组</button>
    </div>
  </div>
  <div class="grid">
    <div>
      <h3>标签</h3>
      <input id="tag-name" placeholder="标签名"/>
      <button id="btn-tag-create">创建标签</button>
      <pre id="tag-list"></pre>
      <input id="tag-delete-id" placeholder="删除标签ID"/>
      <button id="btn-tag-delete">删除标签</button>
    </div>
  </div>
  <div class="grid">
    <div>
      <h3>客户端控制</h3>
      <div class="row">
        <button id="btn-control-meta-load">加载控制状态</button>
        <button id="btn-control-task-refresh">刷新任务</button>
      </div>
      <input id="control-reason" placeholder="操作原因（可选）"/>
      <div class="row">
        <button id="btn-control-code-rotate">轮换离线授权码</button>
        <button id="btn-control-stop">下发停止任务</button>
        <button id="btn-control-uninstall">下发卸载任务</button>
        <button id="btn-control-activate">下发激活任务</button>
      </div>
      <div class="row">
        <button id="btn-control-offline-uninstall-code">获取离线卸载码</button>
      </div>
      <pre id="control-offline-meta"></pre>
      <pre id="control-offline-code"></pre>
      <pre id="control-offline-uninstall-code-display"></pre>
    </div>
    <div>
      <h3>客户端控制任务</h3>
      <pre id="control-task-list"></pre>
      <pre id="control-task-status"></pre>
    </div>
  </div>
</section>
