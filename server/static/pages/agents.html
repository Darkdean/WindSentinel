<section>
  <h2>客户端</h2>
  <div class="row">
    <button id="btn-load-agents">刷新列表</button>
    <select id="agent-list"></select>
  </div>
  <div class="row">
    <input id="agent-search" placeholder="搜索 agent"/>
    <select id="agent-filter-group"></select>
    <select id="agent-filter-tag"></select>
    <label style="width:auto;display:flex;align-items:center;gap:6px;">
      <input id="agent-show-inactive" type="checkbox" style="width:auto;"/>
      展示过期客户端
    </label>
    <button id="btn-agent-filter">筛选</button>
    <button id="btn-agent-filter-reset">清除筛选</button>
  </div>
  <div class="row">
    <input id="agent-offset" placeholder="offset" value="0"/>
    <input id="agent-limit" placeholder="limit" value="200"/>
    <button id="btn-agent-prev">上一页</button>
    <button id="btn-agent-next">下一页</button>
  </div>
  <div id="agent-total"></div>
  <div class="grid">
    <div>
      <h3>客户端列表</h3>
      <div class="row">
        <input id="agents-control-mfa" placeholder="下发停止/卸载前输入MFA验证码"/>
        <input id="agents-control-reason" placeholder="操作原因（可选）"/>
      </div>
      <div class="row">
        <button id="btn-agents-stop">停止选中客户端</button>
        <button id="btn-agents-uninstall">卸载选中客户端</button>
        <button id="btn-agents-delete">删除选中记录</button>
      </div>
      <div id="agent-table"></div>
      <pre id="agents-control-status"></pre>
    </div>
    <div>
      <h3>当前选中客户端健康状态</h3>
      <pre id="agent-health"></pre>
    </div>
  </div>
</section>
